<svg width="300" height="204" viewBox="0 0 300 204" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="204" rx="10" fill="#161B22" stroke="#9745F5" stroke-opacity="0.4"/>
  
  <text x="20" y="35" font-family="Arial" font-size="12" fill="#9745F5" font-weight="bold" style="letter-spacing: 2px;">DAILY HABITS</text>
  
  <!-- Habit 1 -->
  <g transform="translate(20, 60)">
    <rect width="260" height="30" rx="6" fill="#0D1117"/>
    <rect width="220" height="30" rx="6" fill="#9745F5" fill-opacity="0.1"/>
    <text x="10" y="20" font-family="Arial" font-size="12" fill="white">Code &amp; Commit</text>
    <circle cx="245" cy="15" r="5" fill="#9745F5"/>
  </g>
  
  <!-- Habit 2 -->
  <g transform="translate(20, 100)">
    <rect width="260" height="30" rx="6" fill="#0D1117"/>
    <rect width="180" height="30" rx="6" fill="#26A5E4" fill-opacity="0.1"/>
    <text x="10" y="20" font-family="Arial" font-size="12" fill="white">Technical Reading</text>
    <circle cx="245" cy="15" r="5" fill="#26A5E4"/>
  </g>
  
  <!-- Habit 3 -->
