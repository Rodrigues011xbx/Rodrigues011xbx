<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1000" height="300" rx="15" fill="#0D1117" stroke="#9745F5" stroke-opacity="0.3"/>
  
  <!-- Background Glows -->
  <circle cx="800" cy="100" r="150" fill="#9745F5" fill-opacity="0.15" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="100" fill="#26A5E4" fill-opacity="0.1" filter="url(#glow)"/>
  
  <!-- Content -->
  <text x="500" y="140" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="85" fill="white" filter="url(#glow)" style="letter-spacing: -3px;">GABRIEL RODRIGUES</text>
  <text x="500" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#9745F5" font-weight="bold" style="letter-spacing: 12px; text-transform: uppercase;">SHADOW SOVEREIGN DEVELOPER</text>
  
  <!-- Progress Bar Decoration -->
  <rect x="250" y="230" width="500" height="4" rx="2" fill="#161B22"/>
  <rect x="250" y="230" width="380" height="4" rx="2" fill="#9745F5" filter="url(#glow)">
    <animate attributeName="width" values="0;380" dur="2s" fill="freeze" />
  </rect>
</svg>
