<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" rx="15" fill="#0D1117" stroke="#9745F5" stroke-opacity="0.5"/>
  <rect x="10" y="10" width="780" height="380" rx="10" fill="#161B22"/>

  <!-- Left Side: Radar Chart Simulation -->
  <path d="M150 100 L250 150 L200 250 L100 250 L50 150 Z" fill="#9745F5" fill-opacity="0.2" stroke="#9745F5" stroke-width="2" filter="url(#neon)"/>
  <circle cx="150" cy="180" r="80" stroke="white" stroke-opacity="0.1" fill="none"/>
  <circle cx="150" cy="180" r="40" stroke="white" stroke-opacity="0.1" fill="none"/>
  
  <!-- Labels for Radar -->
  <text x="150" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="white" fill-opacity="0.6">FRONTEND</text>
  <text x="270" y="155" text-anchor="start" font-family="Arial" font-size="10" fill="white" fill-opacity="0.6">BACKEND</text>
  <text x="210" y="270" text-anchor="middle" font-family="Arial" font-size="10" fill="white" fill-opacity="0.6">DATABASE</text>
  <text x="90" y="270" text-anchor="middle" font-family="Arial" font-size="10" fill="white" fill-opacity="0.6">DESIGN</text>
  <text x="30" y="155" text-anchor="end" font-family="Arial" font-size="10" fill="white" fill-opacity="0.6">LOGIC</text>

  <!-- Right Side: Vertical Stat Bars -->
  <g transform="translate(350, 60)">
    <text x="0" y="0" font-family="Arial" font-size="12" fill="#9745F5" font-weight="bold" style="letter-spacing: 2px;">STRENGTH (JS/TS)</text>
    <rect x="0" y="10" width="400" height="8" rx="4" fill="#0D1117"/>
    <rect x="0" y="10" width="350" height="8" rx="4" fill="#9745F5" filter="url(#neon)"/>
    <text x="410" y="18" font-family="Arial" font-size="10" fill="white">92%</text>

    <text x="0" y="50" font-family="Arial" font-size="12" fill="#26A5E4" font-weight="bold" style="letter-spacing: 2px;">AGILITY (PYTHON)</text>
    <rect x="0" y="60" width="400" height="8" rx="4" fill="#0D1117"/>
    <rect x="0" y="60" width="320" height="8" rx="4" fill="#26A5E4" filter="url(#neon)"/>
    <text x="410" y="68" font-family="Arial" font-size="10" fill="white">85%</text>

    <text x="0" y="100" font-family="Arial" font-size="12" fill="#FF6B6B" font-weight="bold" style="letter-spacing: 2px;">INTELLIGENCE (SQL)</text>
    <rect x="0" y="110" width="400" height="8" rx="4" fill="#0D1117"/>
    <rect x="0" y="110" width="300" height="8" rx="4" fill="#FF6B6B" filter="url(#neon)"/>
    <text x="410" y="118" font-family="Arial" font-size="10" fill="white">78%</text>

    <text x="0" y="150" font-family="Arial" font-size="12" fill="#F7DF1E" font-weight="bold" style="letter-spacing: 2px;">SENSE (UI/UX)</text>
    <rect x="0" y="160" width="400" height="8" rx="4" fill="#0D1117"/>
    <rect x="0" y="160" width="340" height="8" rx="4" fill="#F7DF1E" filter="url(#neon)"/>
    <text x="410" y="168" font-family="Arial" font-size="10" fill="white">88%</text>
  </g>

  <!-- Bottom: System Status -->
  <text x="400" y="350" text-anchor="middle" font-family="monospace" font-size="14" fill="#9745F5">>> SYSTEM_SCAN_COMPLETE: ALL_STATS_SYNCHRONIZED</text>
</svg>
